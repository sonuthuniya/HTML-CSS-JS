<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="login-container">
        <div>
            <h1 class="login-title">Log In</h1>
            <p class="login-subTitle">
                Welcome back! Enter your details to continue
            </p>
        </div>

        <form class="login-form">
            <div class="input-grp">
                <label for="email">Email Address</label>
                <input type="email" id="input-email" placeholder="👨🏻‍💻 Enter your email" />
            </div>

            <div class="input-grp">
                <label for="password">Password</label>
                <input type="password" id="input-pass" placeholder="🔐 Enter your password" />
            </div>

            <div class="baadme">
                <div class="remember">
                    <input type="checkbox" id="remember-me" />
                    <label for="remember-me">Remember me </label>
                </div>

                <div class="forgot-pass">
                    <a href="#" id="forgot-password">Forgot Password?</a>
                </div>
            </div>

            <div>
                <button type="submit" class="btn-login">Log In</button>
            </div>

            <div class="divider">Or log in with</div>

            <div class="social-login">
                <a href="https://www.linkedin.com/in/sonu-thuniya" class="social-wedge linkedin">in</a>
                <a href="https://www.facebook.com" class="social-wedge fb">f</a>
                <a href="https://accounts.google.com" class="social-wedge google">G</a>
            </div>
        </form>
    </div>

    <script src="main.js"></script>
</body>

</html>
